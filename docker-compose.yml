version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Vector DB Layer
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: simple-rag-qdrant
    ports:
      - "6333:6333" # HTTP REST API / Dashboard
      - "6334:6334" # gRPC (Our Go API and Indexer target)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__TELEMETRY_DISABLED=true

  # ---------------------------------------------------------------------------
  # Shared AI Inference Layer (Rust-based TEI)
  # ---------------------------------------------------------------------------
  tei-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-sha-5bc4d88
    container_name: simple-rag-tei
    ports:
      - "8081:80"
    volumes:
      - tei_cache:/data
    command: --model-id BAAI/bge-small-en-v1.5 --revision main

  # ---------------------------------------------------------------------------
  # Ephemeral Application Mocking (For manual POC execution trigger)
  # ---------------------------------------------------------------------------
  chunker:
    build:
      context: ./apps/chunker
      dockerfile: Dockerfile
    container_name: simple-rag-chunker
    environment:
      # --- AWS Native Setup (configured for testing real S3/SQS) ---
      - AWS_SQS_STAGE_1_URL=https://sqs.eu-central-1.amazonaws.com/790348267926/simple-rag-test-stage-1-parsing
      - AWS_SQS_STAGE_2_URL=https://sqs.eu-central-1.amazonaws.com/790348267926/simple-rag-test-stage-2-indexing
      - AWS_PROFILE=developer
      - AWS_DEFAULT_REGION=eu-central-1
      - AWS_REGION=eu-central-1
      - CONTINUOUS_POLL=true
      - DEBUG_DIR=/app/debug
    volumes:
      - .:/simple-rag
      - ./apps/chunker:/app
      - ~/.aws:/root/.aws:ro

  indexer:
    build:
      context: ./apps/indexer
      dockerfile: Dockerfile
    container_name: simple-rag-indexer
    environment:
      # --- AWS Native Setup (configured for testing real S3/SQS) ---
      - AWS_SQS_STAGE_2_URL=https://sqs.eu-central-1.amazonaws.com/790348267926/simple-rag-test-stage-2-indexing
      - AWS_PROFILE=developer
      
      - AWS_DEFAULT_REGION=eu-central-1
      - AWS_REGION=eu-central-1
      - EMBEDDING_MODEL_TEI_URL=http://tei-embeddings:80
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CONTINUOUS_POLL=true
    volumes:
      - ./apps/indexer:/app
      - ~/.aws:/root/.aws:ro

volumes:
  qdrant_data:
  tei_cache:


