version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Vector DB Layer
  # ---------------------------------------------------------------------------
  qdrant:
    image: ${QDRANT_IMAGE}
    container_name: simple-rag-qdrant
    ports:
      - "${QDRANT_REST_PORT}:6333" # HTTP REST API / Dashboard
      - "${QDRANT_GRPC_PORT}:6334" # gRPC (Our Go API and Indexer target)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__TELEMETRY_DISABLED=true

  # ---------------------------------------------------------------------------
  # Shared AI Inference Layer (Rust-based TEI)
  # ---------------------------------------------------------------------------
  tei-embeddings:
    image: ${TEI_IMAGE}
    container_name: simple-rag-tei
    ports:
      - "${TEI_PORT}:80"
    volumes:
      - tei_cache:/data
    command: --model-id ${TEI_MODEL_ID} --revision ${TEI_MODEL_REVISION}

  # ---------------------------------------------------------------------------
  # Ephemeral Application Mocking (For manual POC execution trigger)
  # ---------------------------------------------------------------------------
  chunker:
    build:
      context: ./apps/chunker
      dockerfile: Dockerfile
    container_name: simple-rag-chunker
    env_file:
      - .env
    environment:
      - CONTINUOUS_POLL=${CHUNKER_CONTINUOUS_POLL}
      - DEBUG_DIR=${CHUNKER_DEBUG_DIR}
    volumes:
      - .:/simple-rag
      - ./apps/chunker:/app
      - ~/.aws:/root/.aws:ro

  indexer:
    build:
      context: ./apps/indexer
      dockerfile: Dockerfile
    container_name: simple-rag-indexer
    env_file:
      - .env
    environment:
      - EMBEDDING_MODEL_TEI_URL=${INDEXER_EMBEDDING_MODEL_TEI_URL}
      - QDRANT_HOST=${INDEXER_QDRANT_HOST}
      - QDRANT_PORT=${INDEXER_QDRANT_PORT}
      - CONTINUOUS_POLL=${INDEXER_CONTINUOUS_POLL}
    volumes:
      - ./apps/indexer:/app
      - ~/.aws:/root/.aws:ro

volumes:
  qdrant_data:
  tei_cache:
