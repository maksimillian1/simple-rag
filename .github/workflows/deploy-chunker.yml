name: Build and Push Chunker to GHCR

on:
  push:
    branches:
      - master
    paths:
      - 'apps/chunker/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/chunker" >> $GITHUB_ENV

      - name: Build and Push Chunker
        run: |
          docker build -t $IMAGE_NAME:sha-${{ github.sha }} ./apps/chunker
          docker push $IMAGE_NAME:sha-${{ github.sha }}
