apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: indexer-netpol
spec:
  endpointSelector:
    matchLabels:
      app: indexer
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: ANY
  - toEndpoints:
    - matchLabels:
        app: qdrant
        k8s:io.kubernetes.pod.namespace: rag-platform
    toPorts:
    - ports:
      - port: "6334"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        app: tei-embeddings
        k8s:io.kubernetes.pod.namespace: rag-platform
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
  - toFQDNs:
    - matchPattern: "*.sqs.*.amazonaws.com"
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
